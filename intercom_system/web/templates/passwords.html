{% extends "base.html" %}

{% block title %}密碼管理 - 門禁系統管理{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-key-fill"></i> 密碼管理</h2>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPasswordModal">
        <i class="bi bi-plus-lg"></i> 新增密碼
    </button>
</div>

<!-- 統計卡片 -->
<div class="row mb-4">
    <div class="col-md-4">
        <div class="card bg-primary text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-hash"></i> 密碼總數</h5>
                <h2 id="totalCount">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-success text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-check-circle"></i> 已啟用</h5>
                <h2 id="activeCount">0</h2>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card bg-secondary text-white">
            <div class="card-body">
                <h5 class="card-title"><i class="bi bi-x-circle"></i> 已停用</h5>
                <h2 id="inactiveCount">0</h2>
            </div>
        </div>
    </div>
</div>

<!-- 密碼列表 -->
<div class="card">
    <div class="card-header">
        <h5 class="mb-0"><i class="bi bi-list-ul"></i> 密碼列表</h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-dark table-striped table-hover" id="passwordsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名稱</th>
                        <th>關聯用戶</th>
                        <th>密碼</th>
                        <th>狀態</th>
                        <th>建立時間</th>
                        <th>最後使用</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- 動態載入 -->
                </tbody>
            </table>
        </div>
        <div class="text-center py-4" id="loadingSpinner">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-secondary">載入中...</p>
        </div>
        <div class="text-center py-4 d-none" id="emptyMessage">
            <i class="bi bi-inbox display-4 text-secondary"></i>
            <p class="mt-2 text-secondary">尚未建立任何密碼</p>
        </div>
    </div>
</div>

<!-- 新增密碼 Modal -->
<div class="modal fade" id="addPasswordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-lg"></i> 新增密碼</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="addPasswordForm">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">關聯用戶</label>
                        <select class="form-select" name="user_id" id="addUserSelect" onchange="onUserSelect(this, 'add')">
                            <option value="">不關聯（獨立密碼）</option>
                            <!-- 動態載入 -->
                        </select>
                        <div class="form-text text-secondary">選擇用戶後，名稱會自動填入</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">使用者名稱</label>
                        <input type="text" class="form-control" name="name" required
                               placeholder="例如：張三、訪客 A">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼 (4-8 位數字)</label>
                        <div class="input-group">
                            <input type="text" class="form-control" name="password" required
                                   pattern="[0-9]{4,8}" placeholder="例如：1234"
                                   maxlength="8">
                            <button type="button" class="btn btn-outline-secondary" onclick="generatePassword()">
                                <i class="bi bi-shuffle"></i> 隨機
                            </button>
                        </div>
                        <div class="form-text text-secondary">密碼必須是 4-8 位數字</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">所屬公司 (選填)</label>
                        <select class="form-select" name="company_id">
                            <option value="0">無</option>
                            {% for company_id, info in companies.items() %}
                            <option value="{{ company_id }}">{{ info.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-lg"></i> 新增
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- 編輯密碼 Modal -->
<div class="modal fade" id="editPasswordModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil"></i> 編輯密碼</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <form id="editPasswordForm">
                <input type="hidden" name="id">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">使用者名稱</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密碼 (4-8 位數字)</label>
                        <input type="text" class="form-control" name="password" required
                               pattern="[0-9]{4,8}" maxlength="8">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">所屬公司</label>
                        <select class="form-select" name="company_id">
                            <option value="0">無</option>
                            {% for company_id, info in companies.items() %}
                            <option value="{{ company_id }}">{{ info.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-lg"></i> 儲存
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    let passwords = [];
    let usersList = [];

    // 載入用戶列表
    async function loadUsersList() {
        const result = await apiCall('/api/users/list');
        if (result.success) {
            usersList = result.data;
            // 填充下拉選單
            const options = '<option value="">不關聯（獨立密碼）</option>' +
                usersList.map(u => `<option value="${u.id}">${u.name}</option>`).join('');
            document.getElementById('addUserSelect').innerHTML = options;
        }
    }

    // 用戶選擇時自動填入名稱
    function onUserSelect(select, mode) {
        const userId = select.value;
        if (userId) {
            const user = usersList.find(u => u.id == userId);
            if (user) {
                if (mode === 'add') {
                    document.querySelector('#addPasswordForm input[name="name"]').value = user.name;
                }
            }
        }
    }

    // 載入密碼列表
    async function loadPasswords() {
        document.getElementById('loadingSpinner').classList.remove('d-none');
        document.getElementById('emptyMessage').classList.add('d-none');

        const result = await apiCall('/api/passwords');

        document.getElementById('loadingSpinner').classList.add('d-none');

        if (result.success) {
            passwords = result.data;
            renderPasswords();
            updateStats();
        } else {
            showAlert('載入密碼列表失敗', 'danger');
        }
    }

    // 渲染密碼列表
    function renderPasswords() {
        const tbody = document.querySelector('#passwordsTable tbody');

        if (passwords.length === 0) {
            tbody.innerHTML = '';
            document.getElementById('emptyMessage').classList.remove('d-none');
            return;
        }

        tbody.innerHTML = passwords.map(pwd => `
            <tr>
                <td>${pwd.id}</td>
                <td>${pwd.name}</td>
                <td>${pwd.user_id ? '<span class="badge bg-info">' + (pwd.user_name || '已關聯') + '</span>' : '<span class="text-muted">-</span>'}</td>
                <td><code>${pwd.password}</code></td>
                <td>
                    <span class="badge ${pwd.active ? 'bg-success' : 'bg-secondary'}">
                        ${pwd.active ? '啟用' : '停用'}
                    </span>
                </td>
                <td>${formatDateTime(pwd.created_at)}</td>
                <td>${pwd.last_used ? formatDateTime(pwd.last_used) : '-'}</td>
                <td>
                    <div class="btn-group btn-group-sm">
                        <button class="btn btn-outline-primary" onclick="editPassword(${pwd.id})" title="編輯">
                            <i class="bi bi-pencil"></i>
                        </button>
                        <button class="btn btn-outline-${pwd.active ? 'warning' : 'success'}"
                                onclick="togglePassword(${pwd.id})"
                                title="${pwd.active ? '停用' : '啟用'}">
                            <i class="bi bi-${pwd.active ? 'pause' : 'play'}"></i>
                        </button>
                        <button class="btn btn-outline-danger" onclick="deletePassword(${pwd.id})" title="刪除">
                            <i class="bi bi-trash"></i>
                        </button>
                    </div>
                </td>
            </tr>
        `).join('');
    }

    // 更新統計
    function updateStats() {
        const total = passwords.length;
        const active = passwords.filter(p => p.active).length;
        const inactive = total - active;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('activeCount').textContent = active;
        document.getElementById('inactiveCount').textContent = inactive;
    }

    // 格式化日期時間
    function formatDateTime(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleString('zh-TW', {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit'
        });
    }

    // 產生隨機密碼
    function generatePassword() {
        const length = Math.floor(Math.random() * 3) + 4; // 4-6 位
        let password = '';
        for (let i = 0; i < length; i++) {
            password += Math.floor(Math.random() * 10);
        }
        document.querySelector('#addPasswordForm input[name="password"]').value = password;
    }

    // 新增密碼
    document.getElementById('addPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const data = {
            name: formData.get('name'),
            password: formData.get('password'),
            company_id: parseInt(formData.get('company_id')),
            user_id: formData.get('user_id') ? parseInt(formData.get('user_id')) : null
        };

        const result = await apiCall('/api/passwords', 'POST', data);

        if (result.success) {
            showAlert('密碼新增成功', 'success');
            bootstrap.Modal.getInstance(document.getElementById('addPasswordModal')).hide();
            this.reset();
            loadPasswords();
        } else {
            showAlert(result.error || '新增失敗', 'danger');
        }
    });

    // 編輯密碼
    function editPassword(id) {
        const pwd = passwords.find(p => p.id === id);
        if (!pwd) return;

        const form = document.getElementById('editPasswordForm');
        form.querySelector('input[name="id"]').value = pwd.id;
        form.querySelector('input[name="name"]').value = pwd.name;
        form.querySelector('input[name="password"]').value = pwd.password;
        form.querySelector('select[name="company_id"]').value = pwd.company_id;

        new bootstrap.Modal(document.getElementById('editPasswordModal')).show();
    }

    // 儲存編輯
    document.getElementById('editPasswordForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const formData = new FormData(this);
        const id = formData.get('id');
        const data = {
            name: formData.get('name'),
            password: formData.get('password'),
            company_id: parseInt(formData.get('company_id'))
        };

        const result = await apiCall(`/api/passwords/${id}`, 'PUT', data);

        if (result.success) {
            showAlert('密碼更新成功', 'success');
            bootstrap.Modal.getInstance(document.getElementById('editPasswordModal')).hide();
            loadPasswords();
        } else {
            showAlert(result.error || '更新失敗', 'danger');
        }
    });

    // 切換啟用狀態
    async function togglePassword(id) {
        const result = await apiCall(`/api/passwords/${id}/toggle`, 'PATCH');

        if (result.success) {
            showAlert('狀態已更新', 'success');
            loadPasswords();
        } else {
            showAlert(result.error || '更新失敗', 'danger');
        }
    }

    // 刪除密碼
    async function deletePassword(id) {
        const pwd = passwords.find(p => p.id === id);
        if (!pwd) return;

        if (!confirm(`確定要刪除「${pwd.name}」的密碼嗎？`)) {
            return;
        }

        const result = await apiCall(`/api/passwords/${id}`, 'DELETE');

        if (result.success) {
            showAlert('密碼已刪除', 'success');
            loadPasswords();
        } else {
            showAlert(result.error || '刪除失敗', 'danger');
        }
    }

    // 頁面載入時載入密碼列表和用戶列表
    document.addEventListener('DOMContentLoaded', function() {
        loadPasswords();
        loadUsersList();
    });
</script>
{% endblock %}

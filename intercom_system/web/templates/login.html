<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 門禁系統管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #1a1a2e;
            --secondary-bg: #16213e;
            --accent: #0f3460;
            --highlight: #e94560;
            --success: #00d9a0;
            --text: #ffffff;
            --text-secondary: #a0a0a0;
        }

        body {
            background: linear-gradient(135deg, var(--primary-bg), var(--secondary-bg));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background-color: var(--secondary-bg);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-logo i {
            font-size: 4em;
            color: var(--highlight);
        }

        .login-logo h1 {
            color: var(--text);
            margin-top: 15px;
            font-size: 1.5em;
        }

        .form-control {
            background-color: var(--accent);
            border: 2px solid var(--accent);
            color: var(--text);
            padding: 12px 15px;
            border-radius: 8px;
        }

        .form-control:focus {
            background-color: var(--accent);
            border-color: var(--highlight);
            color: var(--text);
            box-shadow: 0 0 0 0.25rem rgba(233, 69, 96, 0.25);
        }

        .form-control::placeholder {
            color: var(--text-secondary);
        }

        .form-label {
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .btn-login {
            background-color: var(--highlight);
            border-color: var(--highlight);
            color: white;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }

        .btn-login:hover {
            background-color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .alert {
            border: none;
            border-radius: 8px;
        }

        .input-group-text {
            background-color: var(--accent);
            border-color: var(--accent);
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-logo">
            <i class="bi bi-shield-lock"></i>
            <h1>門禁系統管理</h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">
            <div class="mb-3">
                <label class="form-label">帳號</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" class="form-control" name="username" placeholder="請輸入帳號" required autofocus>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">密碼</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" class="form-control" name="password" placeholder="請輸入密碼" required>
                </div>
            </div>

            <button type="submit" class="btn btn-login">
                <i class="bi bi-box-arrow-in-right"></i> 登入
            </button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
